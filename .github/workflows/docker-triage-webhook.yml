name: Build and Push triage-webhook Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag adicional para publicar no GHCR"
        required: false
        default: "latest"
  push:
    branches: [main]
    paths:
      - "services/triage-webhook/**"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/triage-webhook/go.mod

      - name: Vet & test (race)
        working-directory: services/triage-webhook
        run: |
          test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
          go vet ./...
          go test -race ./...

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-triage-webhook
          tags: |
            type=raw,value=latest
            type=sha
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' && inputs.image_tag != 'latest' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/triage-webhook
          file: services/triage-webhook/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
